<!DOCTYPE html>
<!--
  世界杯转播大屏 v2 · 真数据 + 演示混合
  ─────────────────────────────────────────────
  数据策略（2026-06-11 起）：
  - 真数据（来自 /worldcup ← 直播吧解析）：焦点比赛、今日/近期赛程、比分与状态、
    小组积分榜、近期赛果、世界杯新闻快讯、数据更新时间
  - 演示数据（暂无数据源，面板标"演示数据"）：技术统计条（实时事件已接真数据；晋级概率已移除）
    （这三块等比赛详情页解析落地后接真）
  - 取数顺序：主应用 localhost:3721 → dev 服务器 localhost:3722（node src/worldcup-dev-server.js）
    → 都失败则整页演示数据并顶部提示
  - 国旗：中文队名→flagcdn 映射，未命中退直播吧队徽，再失败隐藏
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FIFA World Cup 2026 · 赛况大屏 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #04061c;
    --bg-1: #090d33;
    --bg-2: #130f4e;
    --card: rgba(12, 18, 58, 0.78);
    --neon: #2e7fff;
    --neon-line: rgba(64, 140, 255, 0.42);
    --neon-soft: rgba(46, 127, 255, 0.35);
    --ink: #eaf2ff;
    --ink-2: #9fb4e0;
    --dim: #5a6ba0;
    --live: #e8273c;
    --live-glow: rgba(232, 39, 60, 0.55);
    --gold: #f0c75e;
    --blue-bar: #2e7fff;
    --red-bar: #e8273c;
    --num: 'Oswald', 'Noto Sans SC', sans-serif;
    --cn: 'Noto Sans SC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #03040f; overflow: hidden; font-family: var(--cn); }

  /* 设计基准 1920×1080；fit() 会按窗口比例在合理范围内动态调整宽高，
     消除上下黑边（布局是 flex/grid，伸缩天然成立），仅极端长宽比下保留最小黑边 */
  #stage {
    position: absolute; top: 0; left: 0; width: 1920px; height: 1080px;
    transform-origin: top left; color: var(--ink);
    background:
      radial-gradient(900px 420px at 50% -12%, rgba(90, 70, 230, 0.35), transparent 65%),
      radial-gradient(1000px 500px at 4% 0%, rgba(120, 60, 220, 0.18), transparent 60%),
      radial-gradient(1000px 500px at 98% 2%, rgba(50, 90, 240, 0.22), transparent 60%),
      linear-gradient(165deg, var(--bg-1) 0%, var(--bg-0) 48%, var(--bg-2) 100%);
    display: flex; flex-direction: column;
  }
  #stage::before {
    content: ''; position: absolute; inset: 0 0 auto 0; height: 240px; pointer-events: none;
    background-image:
      radial-gradient(circle, rgba(140, 170, 255, 0.35) 1px, transparent 1.5px),
      radial-gradient(circle, rgba(140, 170, 255, 0.18) 1px, transparent 1.5px);
    background-size: 110px 64px, 56px 38px;
    background-position: 12px 8px, 30px 20px;
    -webkit-mask-image: linear-gradient(180deg, #000 30%, transparent);
    mask-image: linear-gradient(180deg, #000 30%, transparent);
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--neon-line);
    border-radius: 12px;
    box-shadow: 0 0 0 1px rgba(20, 40, 110, 0.45), 0 0 24px rgba(40, 90, 230, 0.15), inset 0 0 36px rgba(20, 50, 160, 0.08);
    display: flex; flex-direction: column; min-height: 0; overflow: hidden;
  }
  .panel-head {
    flex: none; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px 10px; font-size: 19px; font-weight: 900; letter-spacing: 0.06em;
    border-bottom: 1px solid rgba(64, 140, 255, 0.22);
  }
  .panel-head .aux { font-size: 13px; font-weight: 400; color: var(--ink-2); letter-spacing: 0.05em; }
  .live-tag { color: var(--live); font-size: 14px; font-weight: 700; letter-spacing: 0.12em; }
  /* 常驻动画一律低频离散步进（steps）：任何一个 60fps 的平滑动画都会迫使合成器
     以 60fps 重新合成整屏 → 核显常驻负载。信号灯用 steps(1) 硬闪（更像直播台），
     跑马灯 20 步/秒（步距 ~2px，肉眼接近平滑），整屏合成频率从 60fps 降到 ~20fps。 */
  .live-tag::before { content: '●'; margin-right: 5px; animation: blink 1.4s steps(1, end) infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }
  .demo-tag {
    font-size: 11.5px; font-weight: 400; color: #c9a86a; letter-spacing: 0.1em;
    border: 1px solid rgba(240, 199, 94, 0.4); border-radius: 4px; padding: 1px 8px;
  }
  .panel-link {
    flex: none; text-align: center; font-size: 13.5px; color: var(--neon);
    padding: 8px 0 10px; cursor: pointer; letter-spacing: 0.05em;
  }
  .panel-link:hover { color: #7db1ff; }
  .flag { border-radius: 3px; box-shadow: 0 2px 6px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.12); object-fit: cover; }
  .empty-note { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 14.5px; text-align: center; line-height: 2; }

  /* ── 顶栏 ── */
  .top { height: 104px; flex: none; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: relative; z-index: 2; }
  .top-left { display: flex; align-items: center; gap: 18px; }
  .trophy { font-size: 56px; filter: drop-shadow(0 0 16px rgba(240, 199, 94, 0.6)); }
  .masthead-en {
    font-family: var(--num); font-size: 44px; font-weight: 700; letter-spacing: 0.03em; line-height: 1.05;
    background: linear-gradient(180deg, #ffffff 30%, #b9ccf5 75%, #8fa9e8);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .masthead-en sup { font-size: 14px; -webkit-text-fill-color: #b9ccf5; }
  .masthead-cn { font-size: 15px; color: var(--ink-2); letter-spacing: 0.34em; margin-top: 3px; }
  .top-right { display: flex; align-items: center; }
  .top-stat { padding: 0 30px; text-align: left; border-left: 1px solid rgba(100, 130, 220, 0.25); }
  .top-stat-label { font-size: 13.5px; color: var(--ink-2); display: flex; align-items: center; gap: 7px; }
  .top-stat-value { font-family: var(--num); font-size: 25px; font-weight: 600; letter-spacing: 0.04em; margin-top: 2px; white-space: nowrap; }
  .clock-ico { width: 16px; height: 16px; border: 1.5px solid var(--ink-2); border-radius: 50%; position: relative; flex: none; }
  .clock-ico::before { content: ''; position: absolute; left: 46%; top: 22%; width: 1.5px; height: 32%; background: var(--ink-2); }
  .clock-ico::after { content: ''; position: absolute; left: 46%; top: 46%; width: 32%; height: 1.5px; background: var(--ink-2); }
  .fifa-block {
    margin-left: 30px; padding: 10px 18px; border-radius: 10px;
    background: linear-gradient(160deg, #1b2f8a, #101a55);
    border: 1px solid var(--neon-line);
    font-family: var(--num); font-weight: 700; font-style: italic;
    font-size: 17px; line-height: 1.15; letter-spacing: 0.04em; text-align: center;
  }
  .fifa-block b { display: block; font-size: 26px; color: var(--gold); }
  .conn-banner {
    position: absolute; top: 100px; left: 50%; transform: translateX(-50%); z-index: 5;
    font-size: 13.5px; color: #ffd9a8; letter-spacing: 0.06em;
    background: rgba(90, 50, 10, 0.85); border: 1px solid rgba(240, 180, 90, 0.5);
    border-radius: 8px; padding: 5px 22px; display: none;
  }

  /* ── 主区 ── */
  .main { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 16px; padding: 0 26px; position: relative; z-index: 2; }
  .row1 { flex: 1.95; min-height: 0; display: grid; grid-template-columns: 430px 1fr 470px; gap: 16px; }
  .row2 { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 700px; gap: 16px; }
  .col-left { display: flex; flex-direction: column; gap: 16px; min-height: 0; }
  .stats-panel { flex: 1.55; }
  .others-panel { flex: 1; }

  /* ── 左上：比赛数据（演示） / 小组积分榜（真） ── */
  .stats-teams { display: flex; align-items: center; justify-content: space-between; padding: 14px 26px 6px; }
  .stats-team { text-align: center; }
  .stats-team .flag { width: 74px; height: 50px; }
  .stats-team div { font-size: 17px; font-weight: 700; margin-top: 6px; }
  .stats-list { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; padding: 4px 20px 12px; }
  .stat-row { display: grid; grid-template-columns: 44px 1fr 64px 1fr 44px; align-items: center; gap: 8px; }
  .stat-num { font-family: var(--num); font-size: 19px; font-weight: 600; }
  .stat-num.r { text-align: right; }
  .stat-label { text-align: center; font-size: 14px; color: var(--ink-2); }
  .stat-bar { height: 7px; border-radius: 4px; background: rgba(30, 45, 110, 0.8); position: relative; overflow: hidden; }
  .stat-bar i { position: absolute; top: 0; bottom: 0; border-radius: 4px; }
  .stat-bar.l i { right: 0; background: linear-gradient(90deg, rgba(46,127,255,.35), var(--blue-bar)); box-shadow: 0 0 8px var(--neon-soft); }
  .stat-bar.r i { left: 0; background: linear-gradient(90deg, var(--red-bar), rgba(232,39,60,.35)); box-shadow: 0 0 8px var(--live-glow); }
  .grp-wrap { flex: 1; overflow-y: auto; padding: 10px 18px 8px; display: flex; flex-direction: column; gap: 12px; }
  .grp-name { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 0.18em; margin-bottom: 4px; }
  .grp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .grp-table th { font-weight: 400; color: var(--dim); text-align: left; padding: 2px 5px; border-bottom: 1px solid rgba(64,140,255,.22); }
  .grp-table td { padding: 4px 5px; color: var(--ink-2); border-bottom: 1px dashed rgba(64,140,255,.15); }
  .grp-table .tm { color: var(--ink); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .grp-table .tm .flag { width: 22px; height: 15px; }
  .grp-table .pts { color: var(--gold); font-family: var(--num); font-weight: 700; }

  /* ── 左下：其他比赛 ── */
  .others-list { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; padding: 4px 16px; }
  .other-row { display: flex; align-items: center; gap: 10px; }
  .other-row .flag { width: 34px; height: 23px; }
  .other-row .name { flex: 1; font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .other-row .name.r { text-align: right; }
  .other-score {
    font-family: var(--num); font-size: 17px; font-weight: 700; letter-spacing: 0.06em;
    background: rgba(22, 38, 110, 0.9); border: 1px solid var(--neon-line); border-radius: 7px;
    padding: 2px 14px; white-space: nowrap;
  }

  /* ── 中央 hero ── */
  .hero {
    position: relative; overflow: hidden;
    background:
      linear-gradient(180deg, rgba(6, 10, 38, 0.72) 0%, rgba(6, 10, 38, 0.28) 38%, rgba(4, 8, 32, 0.55) 78%, rgba(4, 6, 28, 0.9) 100%),
      linear-gradient(180deg, rgba(20, 30, 120, 0.45), rgba(20, 30, 120, 0.45)),
      url('https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Mecz_pi%C5%82karski_Wis%C5%82a_Krak%C3%B3w_-_Zag%C5%82%C4%99bie_Sosnwoiec%2C_28_pa%C5%BAdziernika_2022%2C_Po%C5%BCegnanie_Stadionu_Ludowego%2C_KP.jpg/1920px-Mecz_pi%C5%82karski_Wis%C5%82a_Krak%C3%B3w_-_Zag%C5%82%C4%99bie_Sosnwoiec%2C_28_pa%C5%BAdziernika_2022%2C_Po%C5%BCegnanie_Stadionu_Ludowego%2C_KP.jpg')
      center 38% / cover no-repeat;
    background-color: #0a0e35;
    display: flex; flex-direction: column; align-items: center; padding: 16px 36px 14px;
  }
  .hero-banner {
    font-size: 19px; font-weight: 900; letter-spacing: 0.32em; text-indent: 0.32em; color: #dfeaff;
    background: linear-gradient(180deg, rgba(37, 87, 216, 0.95), rgba(22, 48, 143, 0.95));
    border: 1px solid var(--neon-line); padding: 7px 56px;
    clip-path: polygon(5% 0, 95% 0, 100% 100%, 0 100%);
    box-shadow: 0 0 24px rgba(46, 110, 255, 0.5);
  }
  .hero-stage { margin-top: 9px; font-size: 15px; color: #c4d4f8; letter-spacing: 0.28em; text-indent: 0.28em; text-shadow: 0 1px 6px rgba(0,0,0,.8); }
  /* 两侧轨道 minmax(0,1fr) 可收缩 + justify-content:center 兜底：内容再宽也对称分摊，不会单边贴边 */
  .hero-row { flex: 1; display: grid; grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr); align-items: center; justify-items: center; justify-content: center; column-gap: 20px; width: 100%; }
  .hero-team { width: min(170px, 100%); min-width: 0; text-align: center; }
  .hero-team-cn { font-size: 33px; font-weight: 900; letter-spacing: 0.12em; white-space: nowrap; text-shadow: 0 2px 14px rgba(0,0,0,.85); }
  .hero-team .flag { width: min(136px, 94%); height: auto; aspect-ratio: 136 / 91; object-fit: cover; border-radius: 7px; margin-top: 14px; box-shadow: 0 6px 22px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.18); }
  .hero-mid { display: flex; flex-direction: column; align-items: center; min-width: 220px; }
  .hero-score {
    font-family: var(--num); font-size: 124px; font-weight: 700; line-height: 1; letter-spacing: 0.02em;
    color: #fff; text-shadow: 0 0 36px rgba(150, 190, 255, 0.5), 0 4px 18px rgba(0,0,0,.75);
    white-space: nowrap;
  }
  .hero-score i { font-style: normal; font-size: 92px; color: #c9d8f8; margin: 0 8px; }
  .hero-clock {
    margin-top: 10px; font-family: var(--num); font-size: 20px; font-weight: 600; letter-spacing: 0.06em;
    background: linear-gradient(180deg, rgba(30, 60, 160, 0.92), rgba(14, 26, 80, 0.92));
    border: 1px solid var(--neon-line); border-radius: 7px; padding: 2px 18px;
    clip-path: polygon(6% 0, 94% 0, 100% 100%, 0 100%);
    box-shadow: 0 0 18px rgba(46, 110, 255, 0.4);
    white-space: nowrap;
  }
  .hero-foot { flex: none; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; padding: 0 14px 28px; min-height: 64px; }
  .scorer-col { display: flex; flex-direction: column; gap: 9px; }
  .scorer-col.r { align-items: flex-end; }
  .scorer { font-size: 17.5px; color: #eef4ff; display: flex; align-items: center; gap: 9px; text-shadow: 0 1px 8px rgba(0,0,0,.85); }
  .ball { width: 19px; height: 19px; border-radius: 50%; flex: none; position: relative;
    background: radial-gradient(circle at 35% 32%, #fff 0 30%, #cfd8ea 34% 55%, #6f7d99 62% 100%);
    box-shadow: 0 0 6px rgba(255,255,255,.35); }
  .ball::after { content: ''; position: absolute; inset: 30%; background: #2a3550; clip-path: polygon(50% 0, 100% 38%, 81% 100%, 19% 100%, 0 38%); }
  .scorer b { font-family: var(--num); font-weight: 600; color: var(--gold); }
  .hero-meta { width: 100%; text-align: center; font-size: 15.5px; color: #d6e4ff; text-shadow: 0 1px 8px rgba(0,0,0,.9); letter-spacing: 0.05em; }
  .hero-live {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-family: var(--num); font-size: 14px; font-weight: 700; letter-spacing: 0.16em; color: #fff;
    background: var(--live); border-radius: 5px; padding: 3px 16px;
    box-shadow: 0 0 16px var(--live-glow); animation: blink 1.6s steps(1, end) infinite;
  }

  /* ── 右柱：赛程 ── */
  .sched-list { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 12px 14px 4px; }
  .sched-row {
    flex: 1; display: flex; align-items: center; gap: 6px;
    border: 1px solid rgba(64, 140, 255, 0.26); border-radius: 10px;
    background: rgba(14, 22, 66, 0.6); padding: 0 14px;
  }
  .sched-row.live { border-color: rgba(232, 39, 60, 0.65); background: linear-gradient(90deg, rgba(96, 16, 32, 0.6), rgba(46, 14, 44, 0.55)); box-shadow: 0 0 16px rgba(232, 39, 60, 0.2); }
  .sched-time { width: 96px; flex: none; }
  .sched-time b { font-family: var(--num); font-size: 21px; font-weight: 600; display: block; line-height: 1.1; white-space: nowrap; }
  .sched-time .st-live { font-size: 12.5px; color: var(--live); font-weight: 700; }
  .sched-time .st-done { font-size: 12.5px; color: var(--ink-2); }
  .sched-time span { font-size: 11.5px; color: var(--dim); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 92px; }
  .sched-vs { flex: 1; display: grid; grid-template-columns: 1fr 56px 1fr; align-items: center; }
  .sched-side { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 0; }
  .sched-side .flag { width: 56px; height: 38px; }
  .sched-side span { font-size: 15px; font-weight: 500; white-space: nowrap; }
  .sched-vs .vs { font-family: var(--num); font-size: 16px; color: var(--ink-2); text-align: center; white-space: nowrap; }
  .sched-vs .vs.score { font-size: 21px; font-weight: 700; color: #fff; }

  /* ── 下排：实时事件 ── */
  .events-strip { flex: 1; display: flex; align-items: stretch; padding: 8px 6px 4px; min-height: 0; }
  .event-cell { flex: 1; min-width: 0; padding: 6px 14px; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
  .event-cell + .event-cell { border-left: 1px solid rgba(80, 110, 200, 0.3); }
  .event-top { display: flex; align-items: center; gap: 8px; font-family: var(--num); font-size: 16px; font-weight: 600; color: var(--ink-2); }
  .event-main { font-size: 15.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-main.goal { color: #6aa8ff; }
  .event-sub { font-size: 12.5px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ico-yellow { width: 13px; height: 17px; border-radius: 2.5px; background: linear-gradient(160deg, #ffd84d, #e0a800); box-shadow: 0 0 6px rgba(255, 216, 77, 0.5); flex: none; }
  .ico-red { width: 13px; height: 17px; border-radius: 2.5px; background: linear-gradient(160deg, #ff6a6a, #c01730); box-shadow: 0 0 6px rgba(255, 90, 90, 0.5); flex: none; }
  .ico-sub { font-size: 16px; font-weight: 900; flex: none; line-height: 1; }
  .ico-sub .in { color: #3ddc7d; } .ico-sub .out { color: #ff5a5a; }

  /* ── 下排右：近期赛果 / 即将开赛（真） ── */
  .res-list { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; padding: 6px 18px 2px; min-height: 0; }
  .res-row { display: flex; align-items: center; gap: 12px; font-size: 15px; padding: 3px 0; }
  .res-row .when { font-family: var(--num); font-size: 14px; color: var(--ink-2); width: 96px; flex: none; }
  .res-row .stage { font-size: 12.5px; color: var(--dim); width: 150px; flex: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .res-row .pair { flex: 1; display: grid; grid-template-columns: 1fr 70px 1fr; align-items: center; gap: 6px; }
  .res-row .side { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .res-row .side.r { justify-content: flex-end; }
  .res-row .side span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .res-row .flag { width: 28px; height: 19px; }
  .res-row .mid { font-family: var(--num); font-weight: 700; font-size: 17px; text-align: center; color: #fff; white-space: nowrap; }
  .res-row .mid.vs { color: var(--ink-2); font-size: 13px; }

  /* ── 底部新闻快讯 ── */
  .news-bar {
    height: 54px; flex: none; margin: 14px 26px 18px;
    display: flex; align-items: stretch; overflow: hidden;
    background: var(--card); border: 1px solid var(--neon-line); border-radius: 12px;
    position: relative; z-index: 2;
  }
  .news-label {
    flex: none; display: flex; align-items: center; gap: 10px; padding: 0 26px 0 20px;
    font-size: 17px; font-weight: 900; letter-spacing: 0.1em; color: #fff;
    background: linear-gradient(120deg, #6a2cd8, #2e4fd8);
    clip-path: polygon(0 0, 100% 0, calc(100% - 18px) 100%, 0 100%);
  }
  .spk { width: 0; height: 0; border: 8px solid transparent; border-left: 13px solid #fff; border-right: none; transform: translateX(3px); }
  .news-viewport { flex: 1; overflow: hidden; display: flex; align-items: center; }
  .news-track { display: inline-flex; align-items: center; white-space: nowrap; animation: news-scroll 48s steps(960) infinite; }
  .news-item { font-size: 16.5px; color: #d6e4ff; padding: 0 34px; }
  .news-sep { color: var(--dim); }
  @keyframes news-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

// ═══ 取数：主应用 3721 → dev 服务器 3722 → 演示数据 ═══════════════════════════

const API_BASES = ['http://localhost:3721', 'http://localhost:3722'];
const $ = (id) => document.getElementById(id);

let MODE = 'demo';   // 'real' | 'demo'
let VM = null;       // 真数据视图模型

async function fetchReal() {
  for (const base of API_BASES) {
    try {
      const res = await fetch(`${base}/worldcup?viewed=1`, { signal: AbortSignal.timeout(7000) });
      if (!res.ok) continue;
      const data = await res.json();
      if (data?.ok && Array.isArray(data.matches) && data.matches.length) return data;
    } catch { /* 换下一个源 */ }
  }
  return null;
}

function isToday(ms) {
  if (ms == null) return false;
  const d = new Date(ms), n = new Date();
  return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
}

function buildVM(data) {
  const ms = (data.matches || []).slice().sort((a, b) => (a.startMs || 0) - (b.startMs || 0));
  const now = Date.now();
  const live = ms.filter((m) => m.status === 'live');
  const finished = ms.filter((m) => m.status === 'finished' && m.score);
  const upcoming = ms.filter((m) => m.status === 'scheduled' && (m.startMs || 0) > now);
  const today = ms.filter((m) => isToday(m.startMs));
  const focus = live[0] || upcoming[0] || finished[finished.length - 1] || ms[0];
  return {
    ms, live, finished, upcoming, today, focus,
    standings: data.standings || {}, news: data.news || [],
    fetchedAt: data.fetchedAt, stale: !!data.stale,
  };
}

// ═══ 通用格式化 ═══════════════════════════════════════════════════════════════

const pad = (n) => String(n).padStart(2, '0');
function hm(timeStr) { return String(timeStr || '').slice(11, 16) || '--:--'; }
function md(timeStr) { return String(timeStr || '').slice(5, 10).replace('-', '/'); }
function countdown(ms) {
  const diff = ms - Date.now();
  if (diff <= 0) return '即将开球';
  const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
  if (h >= 48) return `${Math.floor(h / 24)} 天后`;
  if (h > 0) return `${h}小时${m}分后开球`;
  return `${m}分钟后开球`;
}

// ═══ 渲染：中央焦点比赛 ═══════════════════════════════════════════════════════

function renderHero(focus) {
  if (!focus) { $('hero').innerHTML = '<div class="empty-note">暂无比赛数据</div>'; return; }
  const banner = focus.status === 'live' ? '正在进行' : (focus.status === 'finished' ? '最近赛果' : '即将开始');
  const mid = focus.score
    ? `<div class="hero-score">${focus.score.home}<i>:</i>${focus.score.away}</div>`
    : `<div class="hero-score" style="font-size:84px;letter-spacing:.18em">VS</div>`;
  const scorer = (s) => `<div class="scorer"><span class="ball"></span><b>${s.min}'</b>&nbsp;${s.name}</div>`;
  // 进球名单只有演示焦点才有（真数据待详情页解析）；真数据展示开球时间+转播渠道
  const foot = (focus.scorersHome || focus.scorersAway)
    ? `<div class="scorer-col">${(focus.scorersHome || []).map(scorer).join('')}</div>
       <div class="scorer-col r">${(focus.scorersAway || []).map(scorer).join('')}</div>`
    : `<div class="hero-meta">开球：${focus.time || '--'}（北京时间）${focus.channels ? ` · 转播：${focus.channels}` : ''}</div>`;

  $('hero').innerHTML = `
    <div class="hero-banner">${banner}</div>
    <div class="hero-stage">${focus.league || ''}</div>
    <div class="hero-row">
      <div class="hero-team"><div class="hero-team-cn">${focus.home}</div>${flagImg(focus.home, focus.homeLogo)}</div>
      <div class="hero-mid">${mid}<div class="hero-clock" id="hero-clock">--</div></div>
      <div class="hero-team"><div class="hero-team-cn">${focus.away}</div>${flagImg(focus.away, focus.awayLogo)}</div>
    </div>
    <div class="hero-foot">${foot}</div>
    ${focus.status === 'live' ? '<div class="hero-live">· LIVE</div>' : ''}`;
  tickHeroClock();
}

let demoHeroSec = 67 * 60 + 24;
function tickHeroClock() {
  const el = $('hero-clock');
  if (!el) return;
  const focus = MODE === 'real' ? VM?.focus : DEMO.focus;
  if (!focus) return;
  if (MODE === 'demo') {
    demoHeroSec++;
    el.textContent = `${Math.floor(demoHeroSec / 60)}:${pad(demoHeroSec % 60)}`;
    return;
  }
  if (focus.status === 'live' && focus.clock?.periodCn) {
    // 真实比赛分钟（qiumibao high_speed，随后端 2 分钟刷新）；墙钟估算含中场休息会虚高
    // 补时只在半场末尾（45'/90'/105'/120'）展示，赛中挂着 +4' 会误导
    const stop = focus.clock.stoppage && /^(45|90|105|120)\D/.test(focus.clock.periodCn)
      ? ` +${focus.clock.stoppage}'` : '';
    el.textContent = `${focus.clock.periodCn}${stop}`;
  } else if (focus.status === 'live' && focus.startMs) {
    el.textContent = `已开球 ${Math.max(0, Math.floor((Date.now() - focus.startMs) / 60000))} 分钟`;
  } else if (focus.status === 'scheduled' && focus.startMs) {
    el.textContent = countdown(focus.startMs);
  } else {
    el.textContent = focus.status === 'finished' ? '已结束' : (focus.time || '');
  }
}

// ═══ 渲染：左上（真=小组积分榜 / 演示=技术统计） ═══════════════════════════════

}

function renderDemoStats() {

// ═══ 渲染：左下 其他比赛 ═══════════════════════════════════════════════════════

// ═══ 渲染：右柱赛程 ═══════════════════════════════════════════════════════════

function renderSchedule(rows, { title, dateText }) {
  $('sched-title').textContent = `🗓 ${title}`;
  $('sched-date').textContent = dateText;
  if (!rows.length) {
    $('sched-list').innerHTML = '<div class="empty-note">暂无赛程数据</div>';
    return;
  }
  $('sched-list').innerHTML = rows.slice(0, 5).map((m) => {
    const statusLine = m.status === 'live'
      ? '<span class="st-live">进行中</span>'
      : (m.status === 'finished' ? '<span class="st-done">已结束</span>' : '');
    const mid = m.score
      ? `<span class="vs score">${m.score.home} - ${m.score.away}</span>`
      : '<span class="vs">VS</span>';
    return `<div class="sched-row ${m.status === 'live' ? 'live' : ''}">
      <div class="sched-time">
        <b>${isToday(m.startMs) ? hm(m.time) : `${md(m.time)} ${hm(m.time)}`}</b>
        ${statusLine}
        <span>${(m.league || '').replace('世界杯', '')}</span>
      </div>
      <div class="sched-vs">
        <div class="sched-side">${flagImg(m.home, m.homeLogo)}<span>${m.home}</span></div>
        ${mid}
        <div class="sched-side">${flagImg(m.away, m.awayLogo)}<span>${m.away}</span></div>
      </div>
    </div>`;
  }).join('');
}

// ═══ 渲染：下排右（近期赛果 / 即将开赛） ═══════════════════════════════════════

function renderBottomRight(vm) {
  const useResults = vm.finished.length > 0;
  const rows = useResults ? vm.finished.slice(-5).reverse() : vm.upcoming.slice(0, 5);
  $('br-title').textContent = useResults ? '近期赛果' : '即将开赛';
  $('br-aux').textContent = useResults ? '' : '72 小时内';
  if (!rows.length) {
    $('br-body').innerHTML = '<div class="empty-note">暂无数据</div>';
    return;
  }
  $('br-body').innerHTML = rows.map((m) => {
    const mid = m.score
      ? `<span class="mid">${m.score.home} - ${m.score.away}</span>`
      : '<span class="mid vs">VS</span>';
    return `<div class="res-row">
      <span class="when">${md(m.time)} ${hm(m.time)}</span>
      <span class="stage">${m.league || ''}</span>
      <div class="pair">
        <div class="side r">${flagImg(m.home, m.homeLogo)}<span>${m.home}</span></div>
        ${mid}
        <div class="side">${flagImg(m.away, m.awayLogo)}<span>${m.away}</span></div>
      </div>
    </div>`;
  }).join('');
}

// ═══ 渲染：实时事件（真数据：qiumibao match_event，经 /worldcup 的 match.events） + 新闻 ═══

function eventIcon(kind) {
  if (kind === 'yellow') return '<span class="ico-yellow"></span>';
  if (kind === 'red') return '<span class="ico-red"></span>';
  if (kind === 'sub') return '<span class="ico-sub"><span class="in">⬆</span><span class="out">⬇</span></span>';
  return '<span class="ball"></span>';
}

// 后端事件 {min,type(中文),name,side,assist?} → 单元格视图
function eventCell(e, focus) {
  const team = e.side === 'home' ? focus.home : (e.side === 'away' ? focus.away : '');
  let kind = 'other', main, sub = '';
  if (/进球|点球|乌龙/.test(e.type)) {
    kind = 'goal';
    main = `${e.name || team} ${e.type}！`;
    sub = e.assist ? `${e.assist} 助攻` : team;
  } else if (/黄牌/.test(e.type)) {
    kind = 'yellow';
    main = team ? `${team} 获得黄牌` : `${e.name} 黄牌`;
    sub = team ? e.name : '';
  } else if (/红牌/.test(e.type)) {
    kind = 'red';
    main = team ? `${team} 获得红牌` : `${e.name} 红牌`;
    sub = team ? e.name : '';
  } else if (/换人|换下/.test(e.type)) {
    kind = 'sub';
    main = team ? `${team} 换人` : '换人';
    sub = e.name;
  } else {
    main = e.name ? `${e.name} ${e.type}` : e.type;
    sub = team;
  }
  return `
    <div class="event-cell">
      <div class="event-top">${eventIcon(kind)} ${e.min}'</div>
      <div class="event-main ${kind === 'goal' ? 'goal' : ''}">${main}</div>
      ${sub ? `<div class="event-sub">${sub}</div>` : ''}
    </div>`;
}

function renderEvents() {
  if (MODE === 'real') {
    $('events-demo-tag').style.display = 'none';
    const focus = VM?.focus;
    const events = (focus?.events || []).slice(-6).reverse(); // 最新在左
    $('events-aux').textContent = events.length ? `${focus.home} vs ${focus.away}` : '';
    $('events-strip').innerHTML = events.length
      ? events.map((e) => eventCell(e, focus)).join('')
      : '<div class="empty-note">焦点比赛开赛后自动生成</div>';
    return;
  }
  $('events-demo-tag').style.display = '';
  $('events-aux').textContent = '';
  $('events-strip').innerHTML = DEMO_EVENTS.map((e) => `
    <div class="event-cell">
      <div class="event-top">${eventIcon(e.type)} ${e.min}'</div>
      <div class="event-main ${e.type === 'goal' ? 'goal' : ''}">${e.main}</div>
      ${e.sub ? `<div class="event-sub">${e.sub}</div>` : ''}
    </div>`).join('');
}

function renderNews(items) {
  const list = items.length ? items : DEMO.news.map((t) => ({ title: t }));
  const html = list.map((n) => `<span class="news-item">${n.title || n}</span>`).join('<span class="news-sep">|</span>');
  $('news-track').innerHTML = html + '<span class="news-sep">|</span>' + html + '<span class="news-sep">|</span>';
}

// ═══ 模式装配 ═════════════════════════════════════════════════════════════════

function renderReal(vm) {
  MODE = 'real'; VM = vm;
  $('conn-banner').style.display = 'none';

  renderHero(vm.focus);
  renderStandings(vm.standings);

  const others = (vm.live.length ? vm.live : vm.upcoming)
    .filter((m) => m !== vm.focus).slice(0, 3);
  renderOthers(others, vm.live.length ? `${vm.live.length} 场进行中` : '接下来');
  $('others-title').textContent = vm.live.length ? '其他比赛' : '后续场次';

  const now = new Date();
  const week = ['日', '一', '二', '三', '四', '五', '六'][now.getDay()];
  const todayRows = vm.today.length ? vm.today : vm.upcoming;
  renderSchedule(todayRows, {
    title: vm.today.length ? '今日赛程' : '近期赛程',
    dateText: `${now.getMonth() + 1}月${now.getDate()}日  星期${week}`,
  });

  renderBottomRight(vm);
  renderEvents();
  renderNews(vm.news);

  $('ts2-label').textContent = '数据更新';
  const f = vm.fetchedAt ? new Date(vm.fetchedAt) : null;
  $('ts2-value').textContent = f ? `${pad(f.getHours())}:${pad(f.getMinutes())}` : '--';
  $('ts3-label').textContent = '数据源';
  $('ts3-value').textContent = vm.stale ? '直播吧 · 缓存' : '直播吧 · 在线';
}

function renderDemo() {
  MODE = 'demo'; VM = null;
  $('conn-banner').style.display = 'block';

  renderHero(DEMO.focus);
  renderDemoStats();
  $('others-title').innerHTML = '其他比赛';
  renderOthers(DEMO.others, '上半场 45+2′');

  const now = new Date();
  const week = ['日', '一', '二', '三', '四', '五', '六'][now.getDay()];
  renderSchedule(DEMO.schedule.map((m) => ({ ...m, startMs: Date.now() })), {
    title: '今日赛程', dateText: `${now.getMonth() + 1}月${now.getDate()}日  星期${week}`,
  });

  renderBottomRight({ finished: DEMO.results, upcoming: [] });
  renderEvents();
  renderNews([]);

  $('ts2-label').textContent = '在线观众';
  $('ts2-value').textContent = '1,248,532';
  $('ts3-label').textContent = '全球热度';
  $('ts3-value').textContent = '🔥 98.7M';
}

async function load() {
  const data = await fetchReal();
  if (data) renderReal(buildVM(data));
  else renderDemo();
}

// ═══ 时钟 / 自动刷新 / 缩放 ═══════════════════════════════════════════════════

function tickTopClock() {
  const n = new Date();
  $('top-clock').textContent =
    `${n.getFullYear()}-${pad(n.getMonth() + 1)}-${pad(n.getDate())} ${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}

function fit() {
  // 自适应填充：保证设计尺寸不小于 1700×940（可读性下限），
  // 在 2400×1700 上限内让舞台宽高跟随窗口比例 → 正常窗口下无黑边
  const MIN_W = 1700, MIN_H = 940, MAX_W = 2400, MAX_H = 1700;
  const s = Math.min(window.innerWidth / MIN_W, window.innerHeight / MIN_H);
  const w = Math.max(MIN_W, Math.min(window.innerWidth / s, MAX_W));
  const h = Math.max(MIN_H, Math.min(window.innerHeight / s, MAX_H));
  const st = $('stage');
  st.style.width = `${w}px`;
  st.style.height = `${h}px`;
  st.style.transform = `scale(${s})`;
  st.style.left = `${Math.max(0, (window.innerWidth - w * s) / 2)}px`;
  st.style.top = `${Math.max(0, (window.innerHeight - h * s) / 2)}px`;
}
window.addEventListener('resize', fit);

// ═══ 出场/退场动画 ═══════════════════════════════════════════════════════════

// 页面加载即播错峰出场（容器先闪入，数据随后填充）；动画结束后摘掉类，
// 避免后续 re-render 或宿主重复打开时状态残留
document.body.classList.add('booting');
setTimeout(() => document.body.classList.remove('booting'), 2200);

// 宿主面板关闭时发来 exit 消息 → 播退场动画（宿主等 ~680ms 再卸载 iframe）
window.addEventListener('message', (event) => {
  if (event?.data?.type !== 'worldcup-exit') return;
  document.body.classList.remove('booting');
  document.body.classList.add('exiting');
});

// ═══ PTT 转发：点过大屏后键盘焦点在本 iframe，空格到不了宿主窗口 ═══════════════
// 把按住空格说话转发回宿主（brain-ui/worldcup.js 接收 worldcup-ptt 消息驱动 PTT）

(() => {
  const isSpace = (e) => e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar';
  let held = false;
  const post = (phase) => { try { window.parent?.postMessage({ type: 'worldcup-ptt', phase }, '*'); } catch {} };
  window.addEventListener('keydown', (e) => {
    if (!isSpace(e) || e.ctrlKey || e.metaKey || e.altKey || e.shiftKey) return;
    e.preventDefault(); // 空格不滚动大屏
    if (e.repeat || held) return;
    held = true;
    post('down');
  }, { capture: true });
  window.addEventListener('keyup', (e) => {
    if (!isSpace(e) || !held) return;
    held = false;
    e.preventDefault();
    post('up');
  }, { capture: true });
  // 按住期间失焦（切窗口/iframe 卸载）→ 取消而非误发半句
  window.addEventListener('blur', () => { if (held) { held = false; post('cancel'); } });
})();

tickTopClock(); setInterval(tickTopClock, 1000);
setInterval(tickHeroClock, 1000);
setInterval(() => { if (MODE === 'real') load(); }, 120000);   // 真数据每 2 分钟跟随后端缓存刷新
fit();
load();
</script>
